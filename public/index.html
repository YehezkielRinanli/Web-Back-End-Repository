<!doctype html>
<html lang="id" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memoora</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />

    <style>
        body { overflow-x: hidden; background-color: #1a1a1a; font-family: 'Outfit', sans-serif; }
        
        #wrapper { transition: margin 0.25s ease-out; }
        
        #sidebar-wrapper {
            height: 100vh;
            width: 250px;
            position: sticky;
            top: 0;
            overflow-y: auto;
            transition: margin 0.25s ease-out;
            background-color: #121212;
            z-index: 1000;
        }
        
        #sidebar-wrapper .list-group-item {
            border: none;
            padding: 15px 25px;
            font-size: 1.1rem;
            transition: all 0.2s;
        }
        
        #sidebar-wrapper .list-group-item:hover {
            background-color: rgba(243, 156, 18, 0.1) !important;
            color: #f39c12 !important;
            padding-left: 35px;
        }
        
        #page-content-wrapper { min-width: 100vw; }

        @media (min-width: 768px) {
            #sidebar-wrapper { margin-left: 0; }
            #page-content-wrapper { min-width: 0; width: 100%; }
            #wrapper.toggled #sidebar-wrapper { margin-left: -250px; }
        }
        @media (max-width: 767.98px) {
            #sidebar-wrapper { margin-left: -250px; }
            #wrapper.toggled #sidebar-wrapper { margin-left: 0; }
        }
        
        .text-gold { color: #f39c12; }
        .btn-gold { background-color: #f39c12; color: #1a1a1a; }
        .btn-gold:hover { background-color: #d68910; color: #1a1a1a; }
    </style>
  </head>
  
  <body class="bg-body-tertiary">

    <div class="d-flex" id="wrapper">
        
        <div class="border-end border-secondary shadow" id="sidebar-wrapper">
<div class="sidebar-heading text-gold fw-bold fs-3 p-3 m-0 border-bottom border-secondary d-flex align-items-center" style="height: 73px;">Memoora</div>            <div class="list-group list-group-flush" id="sidebarNav">
                <a href="#" class="list-group-item list-group-item-action bg-transparent text-gold fw-bold active nav-link" id="navNotes" style="border-left: 4px solid #f39c12;">Dashboard</a>
                <a href="#" class="list-group-item list-group-item-action bg-transparent text-secondary nav-link" id="navFolders">Folders</a>
                <a href="#" class="list-group-item list-group-item-action bg-transparent text-secondary nav-link" id="navCollabs">Collabs</a>
                <a href="#" class="list-group-item list-group-item-action bg-transparent text-secondary nav-link" id="navTags">Tags</a>
                <a href="#" class="list-group-item list-group-item-action bg-transparent text-secondary nav-link" id="navActivities">Aktivitas</a>
                <a href="#" class="list-group-item list-group-item-action bg-transparent text-secondary nav-link" id="navAdmin" style="display: none;">⚙️ Admin Panel</a>
            </div>
        </div>

        <div id="page-content-wrapper" class="w-100 bg-dark">
            
            <nav class="navbar navbar-expand-lg navbar-dark border-bottom border-secondary p-3 shadow-sm sticky-top" style="background-color: #1a1a1a; z-index: 1020;">
                <div class="d-flex align-items-center w-100 gap-3 px-3 flex-wrap">
                    <button class="btn btn-outline-warning fw-bold" id="menu-toggle">☰</button>
                    
                    <input type="text" id="searchInput" class="form-control bg-dark border-secondary text-light d-none d-md-block" placeholder="Cari data..." style="width: 250px" />
                    <select id="statusFilter" class="form-select bg-dark border-secondary text-light w-auto d-none d-md-block">
                        <option value="all">Semua Status</option>
                        <option value="pending">Belum Selesai</option>
                        <option value="completed">Selesai</option>
                    </select>
                    
                    <div class="ms-auto d-flex gap-3 align-items-center">
                        <span class="text-light d-none d-lg-block fs-5 mt-1">Halo, <strong class="text-gold" id="topbarName">Bos</strong></span>
                        <button id="addNoteBtn" class="btn btn-warning fw-bold text-dark shadow-sm" style="display: none;">Buat Baru</button>
                        <div id="userAvatar" class="user-avatar shadow-sm border border-warning" role="button" title="Pengaturan Akun" style="width: 40px; height: 40px; border-radius: 50%; background-color: #f39c12; color: #1a1a1a; display: flex; align-items: center; justify-content: center; font-weight: bold;">?</div>
                    </div>
                </div>
            </nav>

            <div class="container-fluid p-4">

                <div id="bulletinWidget" class="col-12 mb-4"></div>

                <div id="notesContainer" class="row g-4"></div>
                
                <div id="paginationContainer" class="col-12 d-flex justify-content-center mt-5 mb-5 gap-2"></div>
                
            </div>
            
        </div>


    <div id="noteModal" class="custom-modal-overlay" style="display: none; z-index: 1050; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center;">
      <div class="card bg-dark border-secondary p-4 w-100 shadow-lg" style="max-width: 500px; border-radius: 12px;">
        <h4 class="mb-4 text-gold fw-bold">Buat Catatan Baru</h4>
        <form id="noteForm">
          <input type="text" id="noteTitle" class="form-control bg-dark border-secondary text-light mb-3" placeholder="Judul Catatan" required />
          <textarea id="noteDesc" class="form-control bg-dark border-secondary text-light mb-3" placeholder="Deskripsi..." rows="4" required></textarea>
          <select id="noteFolder" class="form-select bg-dark border-secondary text-light mb-3">
            <option value="">Pilih Folder (Opsional)</option>
          </select>
          <div class="row g-2 mb-4">
            <div class="col">
              <input type="date" id="noteDate" class="form-control bg-dark border-secondary text-light" required />
            </div>
            <div class="col">
              <select id="noteTag" class="form-select bg-dark border-secondary text-light">
                <option value="">No Tag</option>
              </select>
            </div>
          </div>
          <div class="d-flex justify-content-end gap-2">
            <button type="button" id="cancelNoteBtn" class="btn btn-outline-light fw-bold px-4">Batal</button>
            <button type="submit" class="btn btn-gold fw-bold px-4">Simpan</button>
          </div>
        </form>
      </div>
    </div>

    <div id="folderModal" class="custom-modal-overlay" style="display: none; z-index: 1050; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center;">
      <div class="card bg-dark border-secondary p-4 w-100 shadow-lg" style="max-width: 400px; border-radius: 12px;">
        <h4 id="folderModalTitle" class="mb-4 text-gold fw-bold">Buat Folder Baru</h4>
        <form id="folderForm">
          <input type="text" id="folderName" class="form-control bg-dark border-secondary text-light mb-4" placeholder="Nama Folder" required />
          <div class="d-flex justify-content-end gap-2">
            <button type="button" id="cancelFolderBtn" class="btn btn-outline-light fw-bold px-4">Batal</button>
            <button type="submit" class="btn btn-warning fw-bold px-4 text-dark">Simpan Folder</button>
          </div>
        </form>
      </div>
    </div>

    <div id="collabModal" class="custom-modal-overlay" style="display: none; z-index: 1050; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center;">
      <div class="card bg-dark border-secondary p-4 w-100 shadow-lg" style="max-width: 450px; border-radius: 12px;">
        <h4 class="mb-4 text-gold fw-bold">Undang Kolaborator</h4>
        <form id="collabForm">
          <input type="email" id="collabEmail" class="form-control bg-dark border-secondary text-light mb-3" placeholder="Email teman (contoh: budi@mikroskil.ac.id)" required />
          <select id="collabRole" class="form-select bg-dark border-secondary text-light mb-4">
            <option value="viewer">Hanya Melihat (Viewer)</option>
            <option value="editor">Bisa Mengedit (Editor)</option>
          </select>
          <div class="d-flex justify-content-end gap-2">
            <button type="button" id="cancelCollabBtn" class="btn btn-outline-light fw-bold px-4">Batal</button>
            <button type="submit" class="btn btn-warning fw-bold px-4 text-dark">Kirim Undangan</button>
          </div>
        </form>
      </div>
    </div>

    <div id="settingsModal" class="custom-modal-overlay" style="display: none; z-index: 1100; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center;">
      <div class="card bg-dark border-secondary p-4 w-100 shadow-lg" style="max-width: 400px; position: relative; border-radius: 12px;">
        <button type="button" id="closeSettingsBtn" class="btn-close btn-close-white position-absolute top-0 end-0 m-3" aria-label="Close" style="font-size: 0.8rem"></button>
        <h4 class="mb-4 text-gold fw-bold text-center">Pengaturan Akun</h4>
        <form id="settingsForm">
          <div class="mb-3">
            <label class="form-label text-gold small fw-bold mb-1">Username Baru</label>
            <input type="text" id="editUsername" class="form-control bg-dark border-secondary text-light" required />
          </div>
          <div class="mb-3">
            <label class="form-label text-gold small fw-bold mb-1">Email Baru</label>
            <input type="email" id="editEmail" class="form-control bg-dark border-secondary text-light" required />
          </div>
          <div class="mb-4">
            <label class="form-label text-gold small fw-bold mb-1">Password Baru (Kosongkan jika tidak ganti)</label>
            <input type="password" id="editPassword" class="form-control bg-dark border-secondary text-light" placeholder="••••••••" />
          </div>

          <div class="d-flex flex-column gap-3">
            <button type="submit" class="btn btn-warning text-dark fw-bold w-100 py-2">Simpan Perubahan</button>
            <hr class="border-secondary my-1 w-100" />
            <div class="d-flex gap-2 w-100">
              <button type="button" id="logoutSettingsBtn" class="btn btn-outline-warning flex-fill fw-bold py-2">Logout</button>
              <button type="button" id="deleteAccountSettingsBtn" class="btn btn-outline-danger flex-fill fw-bold py-2">Hapus Akun</button>
            </div>
          </div>
        </form>
      </div>
    </div>

    <div id="customConfirmModal" class="custom-modal-overlay" style="display: none; z-index: 2000; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center;">
      <div class="card bg-dark border-secondary p-4 w-100 shadow-lg" style="max-width: 400px; border-radius: 12px;">
        <h4 id="confirmTitle" class="mb-3 text-danger fw-bold">Konfirmasi Hapus</h4>
        <p id="confirmText" class="text-light mb-4" style="font-size: 0.95rem">Apakah Anda yakin?</p>
        <input type="text" id="confirmInput" class="form-control bg-dark border-secondary text-light mb-4 text-center fw-bold" style="display: none; letter-spacing: 2px" placeholder="Ketik HAPUS" />
        <div class="d-flex justify-content-end gap-2 mt-2">
          <button type="button" id="btnConfirmCancel" class="btn btn-outline-light fw-bold px-4">Batal</button>
          <button type="button" id="btnConfirmOk" class="btn btn-danger fw-bold px-4">Ya</button>
        </div>
      </div>
    </div>

    <div id="tagModal" class="custom-modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); justify-content: center; align-items: center; z-index: 1000;">
      <div class="card bg-dark border-secondary p-4 shadow-lg" style="width: 400px; max-width: 90%; border-radius: 12px">
        <h4 class="text-gold mb-4 fw-bold" id="tagModalTitle">Buat Tag Baru</h4>
        <form id="tagForm">
          <div class="mb-3">
            <label class="form-label text-light">Nama Tag</label>
            <input type="text" id="tagName" class="form-control bg-dark text-light border-secondary" placeholder="Contoh: Sangat Penting" required />
          </div>
          <div class="mb-4">
            <label class="form-label text-light">Pilih Warna</label>
            <input type="color" id="tagColor" class="form-control form-control-color w-100 bg-dark border-secondary" value="#f39c12" required />
          </div>
          <div class="d-flex justify-content-end gap-2">
            <button type="button" class="btn btn-outline-light fw-bold px-4" id="cancelTagBtn">Batal</button>
            <button type="submit" class="btn btn-warning text-dark fw-bold px-4">Simpan</button>
          </div>
        </form>
      </div>
    </div>

    <div id="bulletinModal" class="custom-modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1050;">
      <div class="card bg-dark border-secondary p-4 w-100 shadow-lg" style="max-width: 500px; border-radius: 12px;">
        <h4 id="bulletinModalTitle" class="mb-4 text-gold fw-bold">Buat Buletin Baru</h4>
        <form id="bulletinForm">
          <input type="text" id="bulletinTitle" class="form-control bg-dark border-secondary text-light mb-3" placeholder="Judul Buletin" required />
          <textarea id="bulletinContent" class="form-control bg-dark border-secondary text-light mb-3" placeholder="Isi pengumuman..." rows="5" required></textarea>
          <div class="d-flex justify-content-end gap-2">
            <button type="button" id="cancelBulletinBtn" class="btn btn-outline-light fw-bold px-4">Batal</button>
            <button type="submit" class="btn btn-gold fw-bold px-4">Simpan</button>
          </div>
        </form>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
